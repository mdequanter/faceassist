<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Smart Vision" }}</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    body {
      cursor: none;
    }

    .smartvision-frame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: #000;
      display: block;
    }
  </style>
</head>
<body>
  <img
    class="smartvision-frame"
    src="{{ url_for('smartvision_feed') }}"
    alt=""
    aria-hidden="true"
  >
</body>
</html>
