<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Smart Vision" }}</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    body {
      cursor: none;
    }

    .smartvision-frame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: #000;
      display: block;
    }

    .message {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(22px, 4vw, 42px);
      font-weight: 700;
      text-align: center;
    }
  </style>
</head>
<body>
  {% if detection_enabled %}
    <div class="message">Pause detection before starting Smart Vision.</div>
  {% else %}
    <img
      class="smartvision-frame"
      src="{{ url_for('smartvision_feed') }}"
      alt=""
      aria-hidden="true"
    >
  {% endif %}
</body>
</html>
