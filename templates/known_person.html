{% extends "base.html" %}
{% set title = "Bekende persoon: " + person %}

{% block content %}
  <h1>Bekende persoon: {{ person }}</h1>

  <p><a href="{{ url_for('faces_page') }}">← Terug naar overzicht</a></p>

  <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:12px;">
    {% for f in files %}
      <div class="panel" style="display:flex; flex-direction:column; gap:8px;">
        <a href="{{ url_for('known_person_file', person=person, filename=f) }}" target="_blank" rel="noreferrer noopener" style="border-radius:12px; overflow:hidden; display:block;">
          <img alt="{{ f }}" src="{{ url_for('known_person_file', person=person, filename=f) }}" style="width:100%; height:220px; object-fit:cover; display:block;">
        </a>
        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
          <div>
            <div class="muted" style="font-size:0.95rem;">{{ f }}</div>
          </div>
          <form action="{{ url_for('known_photo_delete', person=person) }}" method="post" style="margin:0;">
            <input type="hidden" name="filename" value="{{ f }}">
            <button class="btn btn-danger" type="submit" onclick="return confirm('Ben je zeker dat je foto {{ f }} wil verwijderen?');">Verwijder</button>
          </form>
        </div>
      </div>
    {% endfor %}
  </div>

  {% if not files %}
    <p class="muted">Geen foto's gevonden.</p>
  {% endif %}
{% endblock %}
